name: Build

on:
  push:
    branches-ignore:
      - master

jobs:
  build:
    name: Webpack build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: developer-buddy-dist
          path: dist/
          retention-days: 1
